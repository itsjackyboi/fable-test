// ---------- tiny audio ----------
let AC = null, muted = false;
function ac(){ if(!AC){ try{ AC = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return AC; }
function tone(f, dur, type, vol, slide){
  if(muted) return; const a = ac(); if(!a) return;
  const o = a.createOscillator(), g = a.createGain();
  o.type = type||'square'; o.frequency.value = f;
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(20,f+slide), a.currentTime+dur);
  g.gain.setValueAtTime(vol||.08, a.currentTime);
  g.gain.exponentialRampToValueAtTime(.0001, a.currentTime+dur);
  o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime+dur);
}

// ---------- sprites (pixel maps) ----------
function bake(rows, pal, scale){
  scale = scale||1;
  const h = rows.length, w = rows[0].length;
  const c = document.createElement('canvas'); c.width = w*scale; c.height = h*scale;
  const g = c.getContext('2d');
  for(let y=0;y<h;y++) for(let x=0;x<w;x++){
    const ch = rows[y][x]; if(ch==='.'||!pal[ch]) continue;
    g.fillStyle = pal[ch]; g.fillRect(x*scale,y*scale,scale,scale);
  }
  return c;
}
function flip(img){
  const c = document.createElement('canvas'); c.width=img.width; c.height=img.height;
  const g = c.getContext('2d'); g.translate(img.width,0); g.scale(-1,1); g.drawImage(img,0,0);
  return c;
}

// ---------- leaderboard ----------
function lbLoad(){ try{ return JSON.parse(localStorage.getItem('pintland_lb')||'{}'); }catch(e){ return {}; } }
function lbSave(o){ try{ localStorage.setItem('pintland_lb', JSON.stringify(o)); }catch(e){} }
function lbRecord(name, ms){
  const lb = lbLoad();
  const prev = lb[name];
  const improved = prev===undefined || ms<prev;
  if(improved){ lb[name]=ms; lbSave(lb); }
  return improved;
}
function lbTop(n){
  const lb = lbLoad();
  return Object.entries(lb).sort((a,b)=>a[1]-b[1]).slice(0,n);
}
function fmtMs(ms){
  const t = Math.max(0,ms|0), m = (t/60000)|0, s = ((t%60000)/1000)|0, d = ((t%1000)/100)|0;
  return `${m}:${String(s).padStart(2,'0')}.${d}`;
}

function pSpd(){ return player.king.spd * player.spdMul * (player.stuporT>0?1.4:1); }
function pLight(){ return player.king.light + player.lightBonus; }

function solidAt(x,y){
  if(x<0||y<0||x>=N||y>=N) return true;
  return map[y][x]===1;
}
function rngShuffle(a){ for(let i=a.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [a[i],a[j]]=[a[j],a[i]]; } return a; }

// ---------- floor generation ----------
function genFloor(f){
  const F = FLOORS[f];
  floorNo = f;
  N = F.size;
  map = Array.from({length:N},()=>Array(N).fill(1));
  entities = []; pickups = []; projectiles = []; particles = []; decals = []; waves = [];
  stairs = null; bossRef = null; guardianRef = null; stairsSealed = false; arenaC = null;
  aleGot=0; booksGot=0;

  // recursive backtracker maze
  const stack=[[1,1]]; map[1][1]=0;
  while(stack.length){
    const [cxx,cyy] = stack[stack.length-1];
    const dirs = rngShuffle([[2,0],[-2,0],[0,2],[0,-2]]);
    let carved=false;
    for(const [dx,dy] of dirs){
      const nx=cxx+dx, ny=cyy+dy;
      if(nx>0&&ny>0&&nx<N-1&&ny<N-1&&map[ny][nx]===1){
        map[cyy+dy/2][cxx+dx/2]=0; map[ny][nx]=0;
        stack.push([nx,ny]); carved=true; break;
      }
    }
    if(!carved) stack.pop();
  }
  // open a few rooms
  for(let r=0;r<4+f;r++){
    const rw=3+2*((Math.random()*2)|0), rh=3+2*((Math.random()*2)|0);
    const rx=1+2*((Math.random()*((N-rw-2)/2))|0), ry=1+2*((Math.random()*((N-rh-2)/2))|0);
    for(let y=ry;y<ry+rh&&y<N-1;y++) for(let x=rx;x<rx+rw&&x<N-1;x++) map[y][x]=0;
  }
  player.x = 1.5; player.y = 1.5;

  // BFS distances from start
  const dist = bfs(1,1);
  let best=[1,1], bd=0;
  for(let y=0;y<N;y++) for(let x=0;x<N;x++) if(dist[y][x]>bd){ bd=dist[y][x]; best=[x,y]; }

  if(F.boss){
    // carve the boss arena around the far cell
    const ax = Math.min(Math.max(best[0],6), N-7), ay = Math.min(Math.max(best[1],6), N-7);
    for(let y=ay-4;y<=ay+4;y++) for(let x=ax-4;x<=ax+4;x++) map[y][x]=0;
    arenaC = {x:ax+.5, y:ay+.5};
    const b = mkEnemy('boss', ax+.5, ay-1.5);
    entities.push(b); bossRef = b;
    // a few skinless prowl the arena edges
    entities.push(mkEnemy('skinless', ax-3, ay+3));
    entities.push(mkEnemy('skinless', ax+3, ay+3));
  } else {
    stairs = { x:best[0], y:best[1] };
    if(F.guardian){
      // carve the Guardian's chamber around the stairs; seal the descent
      const gx = Math.min(Math.max(stairs.x,3), N-4), gy = Math.min(Math.max(stairs.y,3), N-4);
      for(let y=gy-2;y<=gy+2;y++) for(let x=gx-2;x<=gx+2;x++) map[y][x]=0;
      stairs = {x:gx, y:gy};
      stairsSealed = true;
      const g = mkEnemy('guardian', gx+.5, gy-1.2);
      entities.push(g); guardianRef = g;
    }
  }

  // spawn cells
  const cells=[];
  for(let y=0;y<N;y++) for(let x=0;x<N;x++){
    if(map[y][x]!==0 || dist[y][x]<=6) continue;
    if(stairs && x===stairs.x && y===stairs.y) continue;
    if(arenaC && Math.abs(x+.5-arenaC.x)<5.5 && Math.abs(y+.5-arenaC.y)<5.5) continue;
    cells.push([x,y]);
  }
  rngShuffle(cells);
  let ci=0; const take=()=>cells[ci++ % cells.length];

  for(let i=0;i<F.husks;i++){ const [x,y]=take(); entities.push(mkEnemy('husk', x+.5, y+.5)); }
  for(let i=0;i<F.wisps;i++){ const [x,y]=take(); entities.push(mkEnemy('wisp', x+.5, y+.5)); }
  for(let i=0;i<F.betrayed;i++){ const [x,y]=take(); entities.push(mkEnemy('betrayed', x+.5, y+.5)); }
  for(let i=0;i<F.skinless;i++){ const [x,y]=take(); entities.push(mkEnemy('skinless', x+.5, y+.5)); }

  // pickups
  for(let i=0;i<F.ale;i++){ const [x,y]=take(); pickups.push({kind:'ale', x:x+.5, y:y+.5}); }
  aleTotal = F.ale;
  for(let i=0;i<F.gold;i++){ const [x,y]=take(); pickups.push({kind:'gold', x:x+.5, y:y+.5}); }
  for(let i=0;i<F.books;i++){
    if(!loreDeck.length) loreDeck = rngShuffle(LORE.slice());
    const [x,y]=take(); pickups.push({kind:'book', x:x+.5, y:y+.5, lore:loreDeck.pop()});
  }
  booksTotal = F.books;
  // relics: 2 per floor from the run deck
  for(let i=0;i<2;i++){
    if(!relicDeck.length) break;
    const [x,y]=take(); pickups.push({kind:'relic', x:x+.5, y:y+.5, relic:relicDeck.pop()});
  }
  // hidden armor piece in a far dead end (floors with armorIdx)
  if(F.armorIdx!==undefined){
    const de = deadEnds(dist);
    const spot = de.length ? de[0] : take();
    pickups.push({kind:'armor', x:spot[0]+.5, y:spot[1]+.5, idx:F.armorIdx});
  }
  // hazards & decor
  for(let i=0;i<F.rot;i++){ const [x,y]=take(); decals.push({kind:'rot', x, y}); }
  for(let i=0;i<10;i++){ const [x,y]=take(); decals.push({kind:'bones', x, y}); }
}
function bfs(sx,sy){
  const dist = Array.from({length:N},()=>Array(N).fill(-1));
  const q=[[sx,sy]]; dist[sy][sx]=0;
  while(q.length){
    const [qx,qy]=q.shift();
    [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dx,dy])=>{
      const nx=qx+dx, ny=qy+dy;
      if(nx>=0&&ny>=0&&nx<N&&ny<N&&map[ny][nx]===0&&dist[ny][nx]<0){
        dist[ny][nx]=dist[qy][qx]+1; q.push([nx,ny]);
      }
    });
  }
  return dist;
}
function deadEnds(dist){
  const out=[];
  for(let y=1;y<N-1;y++) for(let x=1;x<N-1;x++){
    if(map[y][x]!==0 || dist[y][x]<8) continue;
    if(stairs && x===stairs.x && y===stairs.y) continue;
    if(arenaC && Math.abs(x+.5-arenaC.x)<5.5 && Math.abs(y+.5-arenaC.y)<5.5) continue;
    let solids=0;
    [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dx,dy])=>{ if(solidAt(x+dx,y+dy)) solids++; });
    if(solids===3) out.push([x,y,dist[y][x]]);
  }
  out.sort((a,b)=>b[2]-a[2]);
  return out;
}
function rotAt(x,y){
  const tx=x|0, ty=y|0;
  return decals.some(d=>d.kind==='rot'&&d.x===tx&&d.y===ty);
}

// ---------- entities ----------
function mkEnemy(kind, x, y){
  const base = {kind, x, y, face:1, hitcd:0, kx:0, ky:0, wt:0, wx:0, wy:0, flash:0};
  if(kind==='husk') return Object.assign(base, {hp:6, maxhp:6, spd:1.7, dmg:2, r:.3, aggro:5.5,
    img:HUSK, imgF:F_HUSK, name:'Soulless Husk'});
  if(kind==='wisp') return Object.assign(base, {hp:3, maxhp:3, spd:3.1, dmg:1, r:.25, aggro:8,
    img:WISP, imgF:F_WISP, bob:Math.random()*6, name:'Rot Wisp'});
  if(kind==='betrayed') return Object.assign(base, {hp:8, maxhp:8, spd:1.9, dmg:2, r:.3, aggro:7,
    img:BETRAYED, imgF:F_BETRAYED, throwT:1+Math.random()*1.5, name:'The Betrayed'});
  if(kind==='skinless') return Object.assign(base, {hp:8, maxhp:8, spd:4.6, dmg:3, r:.28, aggro:6.5,
    img:SKINLESS, imgF:F_SKINLESS, phase:Math.random()*7, name:'Skinless of the 138'});
  if(kind==='guardian') return Object.assign(base, {hp:30, maxhp:30, spd:2.2, dmg:3, r:.45, aggro:5.5,
    img:GUARDIAN, imgF:F_GUARDIAN, slamT:2.5, aggroed:false, name:'THE GUARDIAN OF LAGENDALE'});
  return Object.assign(base, {hp:70, maxhp:70, spd:1.8, dmg:3, r:.55, aggro:8,
    img:BOSS, imgF:F_BOSS, spit:2.5, pool:4, crownDropped:false, aggroed:false,
    name:'THE ROTTED SOUL, VEILRUNNER OF LAGENDALE'});
}

// theme-swap for husks/wisps on later floors
function enemyImg(e){
  if(floorNo===2 && e.kind==='husk') return e.face===1?HUSK3:F_HUSK3;
  if(floorNo===1 && e.kind==='wisp') return e.face===1?WISP2:F_WISP2;
  return e.face===1 ? e.img : e.imgF;
}

// ---------- run setup ----------
function startGame(){
  hideNameInput();
  const k = KINGS[kingSel];
  player.king = k;
  player.maxhp = k.hp; player.hp = k.hp;
  player.gold = 0; player.kills = 0; player.books = 0;
  player.revivesLeft = k.revives||0; player.inv = 0; player.atkcd = 0; player.swing = 0;
  player.relics = {}; player.armor = []; player.bonusDmg = 0; player.dmgRed = 0;
  player.spdMul = 1; player.lightBonus = 0; player.rotImmune = false; player.urnCharge = false;
  player.compass = !!k.compass; player.blickyAmmo = 0; player.blickyCd = 0;
  player.drunk = 0; player.drunkT = 0; player.stuporT = 0;
  player.glyphFrags = 0; player.glyphFull = false; player.armorSet = false;
  loreDeck = rngShuffle(LORE.slice());
  relicDeck = rngShuffle(RELICS.slice());
  runMs = 0; finalMs = 0; lbImproved = false;
  floorNo = 0;
  genFloor(0);
  banner = FLOORS[0].name; bannerT = 3;
  state = 'play';
}
function nextFloor(){
  fadeDir = 1; pendingFloor = floorNo+1;
  SFX.stairs();
}

// ---------- input: name field ----------
// A real <input> is the single source of truth for the name on every device:
// focusing it inside a tap gesture is the only way to open a mobile keyboard,
// and window.prompt() is blocked in sandboxed iframes.
const nameInput = document.getElementById('nameInput');
function sanitizeName(s){ return s.replace(/[^a-zA-Z0-9 _\-']/g,'').slice(0,12); }
function showNameInput(){
  nameInput.value = playerName;
  nameInput.style.display = 'block';
  nameInput.focus();
}
function hideNameInput(){
  nameInput.style.display = 'none';
  nameInput.blur();
}
nameInput.addEventListener('keydown', e=>{
  e.stopPropagation();
  ac();
  if(e.key==='Enter'){
    e.preventDefault();
    if(sanitizeName(nameInput.value).trim().length>=2) confirmName();
  }
});
nameInput.addEventListener('input', ()=>{ tone(500,.03,'square',.03); });

function confirmName(){
  playerName = sanitizeName(nameInput.value).trim();
  try{ localStorage.setItem('pintland_name', playerName); }catch(e){}
  hideNameInput();
  titlePhase = 'king';
  tone(660,.08,'square',.05,120);
}

// ---------- input: keyboard ----------
const keys = {};
addEventListener('keydown', e=>{
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  if(state==='title' && titlePhase==='name'){
    // route stray keys into the name field
    ac(); nameInput.focus();
    return;
  }
  keys[e.key.toLowerCase()] = true;
  if(e.key.toLowerCase()==='m'){ muted=!muted; }
  onPress(e.key.toLowerCase());
});
addEventListener('keyup', e=>{ keys[e.key.toLowerCase()] = false; });

function onPress(k){
  ac();
  if(state==='title'){
    if(titlePhase!=='king') return;
    if(k==='arrowleft'||k==='a') { kingSel=(kingSel+5)%6; tone(330,.05,'square',.04); }
    else if(k==='arrowright'||k==='d') { kingSel=(kingSel+1)%6; tone(330,.05,'square',.04); }
    else if(k==='escape'||k==='backspace'){ titlePhase='name'; showNameInput(); }
    else if(k==='enter'||k===' '||k==='mouse') startGame();
    return;
  }
  if(state==='lore'){ if(k==='enter'||k===' '||k==='e'||k==='mouse'){ state='play'; loreBox=null; } return; }
  if(state==='dead'||state==='win'){
    if(deadT>1||winT>1){ if(k==='enter'||k===' '||k==='mouse'){ state='title'; titlePhase='king'; } }
    return;
  }
  if(state==='play'){
    if(k===' '||k==='j'||k==='mouse') tryAttack();
    if(k==='k') tryBlicky();
  }
}

// ---------- input: touch ----------
const touch = { joyId:null, joyBase:null, joyVec:{x:0,y:0}, btns:{} };
function evPos(e){
  const r = cv.getBoundingClientRect();
  return { x:(e.clientX-r.left)*VW/r.width, y:(e.clientY-r.top)*VH/r.height };
}
const BTN_ATK = {x:VW-38, y:VH-42, r:22};
const BTN_GUN = {x:VW-38, y:VH-92, r:15};
cv.addEventListener('pointerdown', e=>{
  e.preventDefault(); ac();
  const p = evPos(e);
  // any tap/click during name entry focuses the real input (opens the keyboard)
  if(state==='title' && titlePhase==='name'){ nameInput.focus(); return; }
  if(!IS_TOUCH){
    // desktop mouse: title hit-test kings, otherwise generic press
    if(state==='title' && titlePhase==='king' && titleKingHit(p)>=0){ kingSel=titleKingHit(p); tone(330,.05,'square',.04); return; }
    onPress('mouse'); return;
  }
  // touch devices
  if(state==='title'){
    const hit = titleKingHit(p);
    if(hit>=0){ kingSel=hit; tone(330,.05,'square',.04); return; }
    if(p.y>256){ startGame(); return; }
    return;
  }
  if(state!=='play'){ onPress('mouse'); return; }
  if(Math.hypot(p.x-BTN_ATK.x,p.y-BTN_ATK.y)<BTN_ATK.r+8){ touch.btns[e.pointerId]='atk'; tryAttack(); return; }
  if(player.blickyAmmo>0 && Math.hypot(p.x-BTN_GUN.x,p.y-BTN_GUN.y)<BTN_GUN.r+8){ touch.btns[e.pointerId]='gun'; tryBlicky(); return; }
  if(p.x < VW*.55 && touch.joyId===null){
    touch.joyId = e.pointerId; touch.joyBase = p; touch.joyVec = {x:0,y:0};
  }
});
cv.addEventListener('pointermove', e=>{
  if(e.pointerId!==touch.joyId || !touch.joyBase) return;
  const p = evPos(e);
  let dx = (p.x-touch.joyBase.x)/26, dy = (p.y-touch.joyBase.y)/26;
  const l = Math.hypot(dx,dy);
  if(l>1){ dx/=l; dy/=l; }
  touch.joyVec = {x:dx, y:dy};
});
function endPointer(e){
  if(e.pointerId===touch.joyId){ touch.joyId=null; touch.joyBase=null; touch.joyVec={x:0,y:0}; }
  delete touch.btns[e.pointerId];
}
cv.addEventListener('pointerup', endPointer);
cv.addEventListener('pointercancel', endPointer);

// title king portrait hit test (returns index or -1)
const KING_SPACING = 64, KING_Y = 148;
function titleKingHit(p){
  const x0 = VW/2 - KING_SPACING*2.5;
  for(let i=0;i<6;i++){
    const x = x0+i*KING_SPACING;
    if(Math.abs(p.x-x)<26 && p.y>KING_Y-18 && p.y<KING_Y+34) return i;
  }
  return -1;
}

// ---------- movement & combat ----------
function moveCircle(e, dx, dy){
  let nx = e.x + dx;
  if(!circleHits(nx, e.y, e.r)) e.x = nx;
  let ny = e.y + dy;
  if(!circleHits(e.x, ny, e.r)) e.y = ny;
}
function circleHits(x, y, r){
  const x0=Math.floor(x-r), x1=Math.floor(x+r), y0=Math.floor(y-r), y1=Math.floor(y+r);
  for(let ty=y0;ty<=y1;ty++) for(let tx=x0;tx<=x1;tx++){
    if(!solidAt(tx,ty)) continue;
    const cxn=Math.max(tx,Math.min(x,tx+1)), cyn=Math.max(ty,Math.min(y,ty+1));
    if((x-cxn)*(x-cxn)+(y-cyn)*(y-cyn) < r*r) return true;
  }
  return false;
}

function tryAttack(){
  if(player.atkcd>0 || state!=='play') return;
  player.atkcd = player.king.cd; player.swing = .14;
  SFX.swing();
  const R = 1.25, dmg = pDmg(), kb = player.king.kb;
  for(const e of entities){
    const dx=e.x-player.x, dy=e.y-player.y, d=Math.hypot(dx,dy);
    if(d > R + e.r) continue;
    const dot = d>.001 ? (dx/d)*player.fx + (dy/d)*player.fy : 1;
    if(dot < .25) continue;
    hitEnemy(e, dmg, dx/(d||1)*kb, dy/(d||1)*kb);
  }
}
function tryBlicky(){
  if(state!=='play' || player.blickyAmmo<=0 || player.blickyCd>0) return;
  player.blickyAmmo--; player.blickyCd = .3;
  SFX.shot();
  projectiles.push({x:player.x, y:player.y, vx:player.fx*8, vy:player.fy*8, t:2.5, r:.15, dmg:3,
    friendly:true, c1:'#ffe9a0', c2:'#fff'});
}
function hitEnemy(e, dmg, kx, ky){
  e.hp -= dmg; e.flash = .15;
  e.kx += kx||0; e.ky += ky||0;
  if(e.kind==='guardian'||e.kind==='boss') e.aggroed = true;
  SFX.hit();
  spawnParts(e.x, e.y, floorNo===1?'#ff9a7a':'#9fff5a', 5);
  if(e.hp<=0) killEnemy(e);
}
function killEnemy(e){
  entities = entities.filter(o=>o!==e);
  player.kills++;
  spawnParts(e.x, e.y, '#c8d0b8', 10);
  if(e.kind==='boss'){
    finalMs = runMs;
    lbImproved = lbRecord(playerName||'???', finalMs);
    shotKing = KINGS[(Math.random()*KINGS.length)|0].name;
    SFX.roar(); shake = .6;
    setTimeout(()=>{ SFX.win(); }, 600);
    winT = 0; state='win';
    return;
  }
  if(e.kind==='guardian'){
    stairsSealed = false;
    banner = 'THE GUARDIAN FALLS — THE WAY DOWN IS OPEN'; bannerT = 3;
    pickups.push({kind:'armor', x:e.x, y:e.y, idx:1});
    for(let i=0;i<3;i++) pickups.push({kind:'gold', x:e.x+(Math.random()-.5), y:e.y+(Math.random()-.5)});
    SFX.roar();
    return;
  }
  if(Math.random()<.3) pickups.push({kind:'gold', x:e.x, y:e.y});
}

function hurtPlayer(d){
  if(player.inv>0 || player.stuporT>0 || state!=='play') return;
  d = Math.max(1, d - player.dmgRed);
  player.hp -= d; player.inv = .8; shake = .25;
  SFX.hurt();
  spawnParts(player.x, player.y, '#e05a4e', 6);
  if(player.hp<=0){
    if(player.urnCharge){
      player.urnCharge = false; player.hp = 1;
      banner = 'THE HOLLOW URN SHATTERS — YOUR SOUL RETURNS'; bannerT = 2.5;
      SFX.glyph();
      return;
    }
    if(player.revivesLeft>0){
      player.revivesLeft--;
      player.hp = Math.ceil(player.maxhp/2);
      banner = 'THE ALEFORGE ALE CALLS HIM BACK!'; bannerT = 2.5;
      SFX.ale();
      return;
    }
    SFX.die();
    dyingT = 0; state='dying';
  }
}
function spawnParts(x,y,col,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=1+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,t:.4+Math.random()*.3,col});
  }
}

// ---------- pickups ----------
function applyPickup(p){
  if(p.kind==='gold'){
    player.gold += Math.round((1+((Math.random()*4)|0)) * (player.king.goldMul||1));
    SFX.gold();
  } else if(p.kind==='ale'){
    aleGot++;
    const heal = 4*(player.king.aleMul||1) + (player.king.aleBonus||0);
    if(player.hp>=player.maxhp){
      // drinking at full health: the drunk meter
      player.drunk = Math.min(3, player.drunk+1); player.drunkT = 20;
      banner = `DRUNK x${player.drunk} — HARDER SWINGS, WOBBLIER LEGS`; bannerT = 2;
    } else {
      player.hp = Math.min(player.maxhp, player.hp+heal);
    }
    SFX.ale(); spawnParts(p.x,p.y,'#f5f0dc',6);
    if(aleGot>=aleTotal && aleTotal>0){
      player.stuporT = 6;
      banner = 'DRUNKEN STUPOR! UNTOUCHABLE AND UNSTOPPABLE'; bannerT = 3;
      SFX.stupor();
    }
  } else if(p.kind==='book'){
    player.books++; booksGot++;
    SFX.book(); loreBox = p.lore; state='lore';
    if(booksGot>=booksTotal && booksTotal>0){
      player.glyphFrags++;
      player.maxhp += 2; player.hp = Math.min(player.maxhp, player.hp+2);
      banner = 'A FRAGMENT OF THE GLYPH OF PURITY REVEALS ITSELF (+2 MAX HP)'; bannerT = 3.5;
      SFX.glyph();
      if(player.glyphFrags>=3 && !player.glyphFull){
        player.glyphFull = true;
        player.hp = player.maxhp;
        banner = 'THE GLYPH OF PURITY IS WHOLE — ROT FEARS YOU (+2 DMG)'; bannerT = 4;
      }
    }
  } else if(p.kind==='relic'){
    const r = p.relic;
    player.relics[r.id] = r;
    if(r.id==='whopper') player.bonusDmg += 2;
    if(r.id==='dunks') player.spdMul *= 1.2;
    if(r.id==='sbarmor') player.dmgRed += 1;
    if(r.id==='hazmat') player.rotImmune = true;
    if(r.id==='lantern') player.lightBonus += 2.5;
    if(r.id==='urn') player.urnCharge = true;
    if(r.id==='scarab') player.compass = true;
    if(r.id==='blicky') player.blickyAmmo = 8;
    banner = `${r.name} — ${r.desc}`; bannerT = 3;
    SFX.relic();
  } else if(p.kind==='armor'){
    const a = ARMOR[p.idx];
    player.armor[p.idx] = true;
    player.maxhp += 1; player.hp = Math.min(player.maxhp, player.hp+1);
    banner = `${a.name} (+1 MAX HP)`; bannerT = 3;
    SFX.armor();
    if(player.armor.filter(Boolean).length===4 && !player.armorSet){
      player.armorSet = true; player.spdMul *= 1.1;
      banner = "THE SHRINES' PROMISE IS KEPT — +2 DMG, +10% SPEED"; bannerT = 4;
      SFX.glyph();
    }
  }
}

// ---------- update ----------
function update(dt){
  time += dt;
  if(state==='title' && titlePhase==='name') playerName = sanitizeName(nameInput.value);
  if(bannerT>0) bannerT-=dt;
  if(shake>0) shake-=dt;

  if(fadeDir===1){
    fade += dt*2.5;
    if(fade>=1){
      fade=1; fadeDir=-1;
      floorNo = pendingFloor;
      genFloor(floorNo);
      banner = FLOORS[floorNo].name; bannerT = 3;
      if(FLOORS[floorNo].boss){ setTimeout(()=>SFX.roar(), 400); }
    }
  } else if(fadeDir===-1){
    fade -= dt*2.5;
    if(fade<=0){ fade=0; fadeDir=0; }
  }

  if(state!=='play' || fadeDir===1) return;
  runMs += dt*1000;

  // heartbeat drone in the Sepulcher
  if(floorNo===2){
    hbT -= dt;
    if(hbT<=0){ hbT = 1.5; SFX.heartbeat(); }
  }

  // --- player ---
  let ix=0, iy=0;
  if(keys['arrowup']||keys['w']) iy-=1;
  if(keys['arrowdown']||keys['s']) iy+=1;
  if(keys['arrowleft']||keys['a']) ix-=1;
  if(keys['arrowright']||keys['d']) ix+=1;
  if(touch.joyId!==null){ ix = touch.joyVec.x; iy = touch.joyVec.y; }
  if(ix||iy){
    let wx = ix/2 + iy, wy = iy - ix/2;
    let l = Math.hypot(wx,wy); wx/=l; wy/=l;
    // drunk wobble: rotate movement vector
    if(player.drunk>0){
      const a = Math.sin(time*3.2)*.3*player.drunk;
      const ca=Math.cos(a), sa=Math.sin(a);
      const rx = wx*ca - wy*sa, ry = wx*sa + wy*ca;
      wx=rx; wy=ry;
    }
    player.fx = wx; player.fy = wy;
    if(Math.abs(ix)>.2) player.face = ix>0?1:-1;
    const mv = Math.min(1, Math.hypot(ix,iy));
    moveCircle(player, wx*pSpd()*mv*dt, wy*pSpd()*mv*dt);
  }
  if(player.atkcd>0) player.atkcd-=dt;
  if(player.swing>0) player.swing-=dt;
  if(player.inv>0) player.inv-=dt;
  if(player.blickyCd>0) player.blickyCd-=dt;
  if(player.stuporT>0) player.stuporT-=dt;
  if(player.drunkT>0){ player.drunkT-=dt; if(player.drunkT<=0) player.drunk=0; }

  // rot pools hurt
  if(!player.rotImmune && rotAt(player.x, player.y)){
    player.rotTick -= dt;
    if(player.rotTick<=0){ player.rotTick=.8; hurtPlayer(1); }
  } else player.rotTick = 0;

  // stairs
  if(stairs && !stairsSealed && Math.hypot(player.x-(stairs.x+.5), player.y-(stairs.y+.5))<.5 && fadeDir===0){
    nextFloor();
  }

  // --- pickups ---
  for(const p of pickups.slice()){
    if(Math.hypot(player.x-p.x, player.y-p.y) < .55){
      pickups = pickups.filter(o=>o!==p);
      applyPickup(p);
    }
  }

  // --- enemies ---
  for(const e of entities){
    if(e.flash>0) e.flash-=dt;
    if(e.hitcd>0) e.hitcd-=dt;
    if(Math.abs(e.kx)>.01||Math.abs(e.ky)>.01){
      moveCircle(e, e.kx*dt, e.ky*dt);
      e.kx*=Math.pow(.001,dt); e.ky*=Math.pow(.001,dt);
    }
    const dx=player.x-e.x, dy=player.y-e.y, d=Math.hypot(dx,dy);
    const aggro = (e.kind==='guardian'||e.kind==='boss') ? (e.aggroed?99:e.aggro) : e.aggro;
    if(d < aggro && state==='play'){
      if(e.kind==='guardian'||e.kind==='boss') e.aggroed = true;
      let mx = dx/d, my = dy/d, s = e.spd;
      if(e.kind==='boss' && e.hp<e.maxhp/2) s*=1.55;
      if(e.kind==='skinless'){
        // erratic zig-zag lunge
        const a = Math.sin(time*7+e.phase)*.9;
        const ca=Math.cos(a), sa=Math.sin(a);
        const rx = mx*ca - my*sa, ry = mx*sa + my*ca;
        mx=rx; my=ry;
      }
      if(e.kind==='betrayed'){
        // keep spear distance: retreat close, hold mid, advance far
        if(d<2.2){ mx=-mx; my=-my; }
        else if(d<5){ mx=0; my=0; }
        e.throwT -= dt;
        if(e.throwT<=0 && d<7){
          e.throwT = 2.4;
          SFX.spear();
          projectiles.push({x:e.x, y:e.y, vx:dx/d*5, vy:dy/d*5, t:2.5, r:.18, dmg:2,
            friendly:false, c1:'#b8b8c0', c2:'#e8e8f0'});
        }
      }
      if(mx||my) moveCircle(e, mx*s*dt, my*s*dt);
      if(dx!==0) e.face = (dx-dy)>0?1:-1;
      if(d < e.r+player.r+.12 && e.hitcd<=0){
        e.hitcd=.8; hurtPlayer(e.dmg);
      }
    } else {
      e.wt-=dt;
      if(e.wt<=0){ e.wt=1+Math.random()*2; const a=Math.random()*Math.PI*2; e.wx=Math.cos(a); e.wy=Math.sin(a); }
      moveCircle(e, e.wx*e.spd*.3*dt, e.wy*e.spd*.3*dt);
    }
    // guardian slam
    if(e.kind==='guardian' && e.aggroed){
      e.slamT -= dt;
      if(e.slamT<=0 && d<4.2){
        e.slamT = 3.5;
        SFX.slam(); shake = Math.max(shake,.3);
        waves.push({x:e.x, y:e.y, rad:.3, max:3.4, hit:false});
      }
    }
    // boss abilities
    if(e.kind==='boss' && e.aggroed){
      e.spit-=dt;
      if(e.spit<=0){
        e.spit = e.hp<e.maxhp/2 ? 1.6 : 2.6;
        const base=Math.atan2(dy,dx);
        for(let i=-1;i<=1;i++){
          const a=base+i*.35;
          projectiles.push({x:e.x, y:e.y, vx:Math.cos(a)*4.5, vy:Math.sin(a)*4.5, t:3, r:.2, dmg:2,
            friendly:false, c1:'#79c94f', c2:'#c4ff8a'});
        }
        tone(90,.2,'sawtooth',.07,-30);
      }
      e.pool-=dt;
      if(e.pool<=0){
        e.pool=5;
        const tx=e.x|0, ty=e.y|0;
        if(!rotAt(tx,ty)) decals.push({kind:'rot', x:tx, y:ty, temp:12});
      }
      if(!e.crownDropped && e.hp < e.maxhp/2){
        e.crownDropped = true;
        pickups.push({kind:'armor', x:e.x, y:e.y+1, idx:3});
        banner = 'THE SHRINE CROWN BREAKS FROM THE ROTTED SOUL'; bannerT = 3;
        SFX.armor();
      }
    }
  }

  // shockwaves
  for(const w of waves.slice()){
    w.rad += 3.6*dt;
    if(w.rad>=w.max){ waves = waves.filter(o=>o!==w); continue; }
    const d = Math.hypot(player.x-w.x, player.y-w.y);
    if(!w.hit && Math.abs(d-w.rad)<.35){ w.hit=true; hurtPlayer(2); }
  }

  // rot pool expiry
  for(const d of decals) if(d.temp!==undefined) d.temp-=dt;
  decals = decals.filter(d=>d.temp===undefined||d.temp>0);

  // --- projectiles ---
  for(const pr of projectiles.slice()){
    pr.x += pr.vx*dt; pr.y += pr.vy*dt; pr.t -= dt;
    if(pr.t<=0 || circleHits(pr.x, pr.y, pr.r)){ projectiles=projectiles.filter(o=>o!==pr); continue; }
    if(pr.friendly){
      for(const e of entities){
        if(Math.hypot(pr.x-e.x, pr.y-e.y) < pr.r+e.r){
          projectiles=projectiles.filter(o=>o!==pr);
          hitEnemy(e, pr.dmg, pr.vx*.6, pr.vy*.6);
          break;
        }
      }
    } else if(Math.hypot(pr.x-player.x, pr.y-player.y) < pr.r+player.r){
      projectiles=projectiles.filter(o=>o!==pr);
      hurtPlayer(pr.dmg);
    }
  }

  // --- particles ---
  for(const p of particles){ p.x+=p.vx*dt; p.y+=p.vy*dt; p.t-=dt; }
  particles = particles.filter(p=>p.t>0);
}

// ---------- render ----------
function isoX(x,y){ return (x-y)*TW/2; }
function isoY(x,y){ return (x+y)*TH/2; }
function theme(){ return FLOORS[floorNo].theme; }

function render(){
  cx.fillStyle = '#08070a';
  cx.fillRect(0,0,VW,VH);
  if(state==='title'){ drawTitle(); return; }

  const T = theme();
  const camX = isoX(player.x, player.y);
  const camY = isoY(player.x, player.y);
  const ox = CXO - camX + (shake>0 ? (Math.random()-.5)*6 : 0);
  const oy = CYO - camY + (shake>0 ? (Math.random()-.5)*6 : 0);

  // pass 1: floor tiles + flat decals
  for(let y=0;y<N;y++) for(let x=0;x<N;x++){
    if(map[y][x]!==0) continue;
    const sx = isoX(x+.5,y+.5)+ox, sy = isoY(x+.5,y+.5)+oy;
    if(sx<-TW||sx>VW+TW||sy<-TH*2||sy>VH+TH*2) continue;
    drawFloorTile(sx, sy, x, y, T);
  }
  // stairs
  if(stairs){
    const sx = isoX(stairs.x+.5, stairs.y+.5)+ox, sy = isoY(stairs.x+.5, stairs.y+.5)+oy;
    drawDiamond(sx, sy, '#050408');
    cx.fillStyle='#2a2434';
    cx.fillRect(sx-6, sy-3, 12, 2);
    cx.fillRect(sx-4, sy, 8, 2);
    if(stairsSealed){
      cx.fillStyle='#5a6a78';
      cx.fillRect(sx-5, sy-6, 10, 3); // sealed slab
    } else {
      cx.fillStyle = (Math.sin(time*5)>0)?T.stairA:T.stairB;
      cx.fillRect(sx-1, sy-6, 2, 2);
    }
  }

  // pass 2: sorted drawables
  const pDepth = player.x+player.y;
  const draws = [];
  for(let y=0;y<N;y++) for(let x=0;x<N;x++){
    if(map[y][x]!==1) continue;
    if(solidAt(x+1,y)&&solidAt(x,y+1)&&solidAt(x-1,y)&&solidAt(x,y-1)&&solidAt(x+1,y+1)) continue;
    const sx = isoX(x+.5,y+.5)+ox, sy = isoY(x+.5,y+.5)+oy;
    if(sx<-TW*1.5||sx>VW+TW*1.5||sy<-TH*3||sy>VH+TH*4) continue;
    // cutaway: walls in front of & near the player draw as short opaque stubs,
    // so they stay unambiguously solid while showing the corridor behind them
    const stub = x+y+1 > pDepth && Math.hypot(x+.5-player.x, y+.5-player.y) < 3;
    draws.push({d:x+y+1, f:()=>drawWall(sx,sy,T,stub)});
  }
  for(const p of pickups){
    const sx = isoX(p.x,p.y)+ox, sy = isoY(p.x,p.y)+oy;
    draws.push({d:p.x+p.y, f:()=>drawPickup(p,sx,sy)});
  }
  for(const e of entities){
    const sx = isoX(e.x,e.y)+ox, sy = isoY(e.x,e.y)+oy;
    draws.push({d:e.x+e.y, f:()=>drawEnemy(e,sx,sy)});
  }
  { const sx = isoX(player.x,player.y)+ox, sy = isoY(player.x,player.y)+oy;
    draws.push({d:player.x+player.y, f:()=>drawPlayer(sx,sy)}); }
  for(const pr of projectiles){
    const sx = isoX(pr.x,pr.y)+ox, sy = isoY(pr.x,pr.y)+oy;
    draws.push({d:pr.x+pr.y, f:()=>{
      cx.fillStyle=pr.c1; cx.fillRect(sx-2, sy-4, 4, 4);
      cx.fillStyle=pr.c2; cx.fillRect(sx-1, sy-3, 2, 2);
    }});
  }
  for(const w of waves){
    const sx = isoX(w.x,w.y)+ox, sy = isoY(w.x,w.y)+oy;
    draws.push({d:w.x+w.y+.02, f:()=>{
      cx.strokeStyle='rgba(122,255,255,.7)'; cx.lineWidth=2;
      cx.beginPath();
      cx.ellipse(sx, sy, w.rad*TW/2, w.rad*TH/2, 0, 0, Math.PI*2);
      cx.stroke();
    }});
  }
  for(const p of particles){
    const sx = isoX(p.x,p.y)+ox, sy = isoY(p.x,p.y)+oy;
    draws.push({d:p.x+p.y+.01, f:()=>{ cx.fillStyle=p.col; cx.fillRect(sx-1,sy-6,2,2); }});
  }
  draws.sort((a,b)=>a.d-b.d);
  for(const d of draws) d.f();

  drawDarkness(T);

  // depth-3 ambient ash (screen-space, deterministic)
  if(T.ash){
    cx.fillStyle='rgba(160,150,140,.35)';
    for(let i=0;i<32;i++){
      const axx=(i*97 + ((i%3)*40))%VW;
      const ayy=(i*61 + time*(9+(i%7)*3))%VH;
      cx.fillRect(axx, ayy, 1, 1);
    }
  }
  // stupor tint
  if(player.stuporT>0){
    cx.fillStyle=`rgba(244,196,48,${.06+.03*Math.sin(time*10)})`;
    cx.fillRect(0,0,VW,VH);
  }

  drawHUD();
  drawTouchUI();
  if(state==='lore' && loreBox) drawLore();
  if(state==='dying') drawDying();
  if(state==='dead') drawDead();
  if(state==='win') drawWin();

  if(fade>0){ cx.fillStyle=`rgba(4,3,6,${Math.min(1,fade)})`; cx.fillRect(0,0,VW,VH); }
}

function drawDiamond(sx, sy, col){
  cx.fillStyle = col;
  cx.beginPath();
  cx.moveTo(sx, sy-TH/2); cx.lineTo(sx+TW/2, sy); cx.lineTo(sx, sy+TH/2); cx.lineTo(sx-TW/2, sy);
  cx.closePath(); cx.fill();
}

function drawFloorTile(sx, sy, x, y, T){
  const v = ((x*7+y*13)%3);
  drawDiamond(sx, sy, T.floors[v]);
  if((x*31+y*17)%7===0){ cx.fillStyle=T.crack; cx.fillRect(sx-3, sy-1, 6, 1); }
  for(const d of decals){
    if(d.x!==x||d.y!==y) continue;
    if(d.kind==='rot'){
      const pulse = .5+.5*Math.sin(time*3+x+y);
      drawDiamond(sx, sy, `rgba(${T.rot},${.55+.25*pulse})`);
      cx.fillStyle=`rgba(${T.rotSpark},${.3+.3*pulse})`;
      cx.fillRect(sx-2, sy-1, 2, 1); cx.fillRect(sx+3, sy+1, 2, 1); cx.fillRect(sx-6, sy+1, 1, 1);
    } else if(d.kind==='bones'){
      cx.fillStyle=T.bones;
      cx.fillRect(sx-4, sy, 5, 1); cx.fillRect(sx+2, sy-2, 2, 2); cx.fillRect(sx-6, sy-1, 1, 1);
    }
  }
}

function drawWall(sx, sy, T, stub){
  const h = stub ? STUBH : WALLH;
  const t = sy - h;
  cx.fillStyle = T.wallL;
  cx.beginPath();
  cx.moveTo(sx-TW/2, sy); cx.lineTo(sx, sy+TH/2); cx.lineTo(sx, sy+TH/2-h); cx.lineTo(sx-TW/2, sy-h);
  cx.closePath(); cx.fill();
  cx.fillStyle = T.wallR;
  cx.beginPath();
  cx.moveTo(sx+TW/2, sy); cx.lineTo(sx, sy+TH/2); cx.lineTo(sx, sy+TH/2-h); cx.lineTo(sx+TW/2, sy-h);
  cx.closePath(); cx.fill();
  cx.fillStyle = T.wallTop;
  cx.beginPath();
  cx.moveTo(sx, t-TH/2); cx.lineTo(sx+TW/2, t); cx.lineTo(sx, t+TH/2); cx.lineTo(sx-TW/2, t);
  cx.closePath(); cx.fill();
  cx.fillStyle = T.brick;
  cx.fillRect(sx-TW/2+2, sy-h+4, TW/2-4, 1);
  if(!stub) cx.fillRect(sx+2, sy-h+10, TW/2-4, 1);
}

function drawShadow(sx, sy, w){
  cx.fillStyle='rgba(0,0,0,.35)';
  cx.beginPath(); cx.ellipse(sx, sy, w, w/2, 0, 0, Math.PI*2); cx.fill();
}

function drawPlayer(sx, sy){
  drawShadow(sx, sy, 8);
  const img = player.face===1 ? player.king.img : player.king.imgF;
  const blink = player.inv>0 && (time*20|0)%2===0 && state==='play';
  if(!blink) cx.drawImage(img, sx-img.width, sy-img.height*2-2, img.width*2, img.height*2);
  if(state==='dying'){
    // soul leaving: greening body + rising wisp
    const k = Math.min(1, dyingT/1.4);
    cx.globalAlpha = k*.7;
    cx.fillStyle = '#5a7a4a';
    cx.fillRect(sx-img.width, sy-img.height*2-2, img.width*2, img.height*2);
    cx.globalAlpha = 1;
    const soulY = sy - img.height*2 - 6 - k*34;
    cx.globalAlpha = Math.max(0, .9 - k*.7);
    cx.fillStyle='#e8f0e8';
    cx.fillRect(sx-2, soulY, 4, 5);
    cx.fillRect(sx-1, soulY-2, 2, 2);
    cx.globalAlpha = 1;
  }
  if(player.swing>0){
    const a = Math.atan2(player.fy+player.fx, (player.fx-player.fy)*.5);
    cx.strokeStyle = '#ffe9a0'; cx.lineWidth = 2;
    cx.beginPath();
    cx.arc(sx, sy-12, 18, a-.9, a+.9);
    cx.stroke();
  }
  // compass: arrow toward the way down
  if(player.compass && state==='play'){
    const tgt = arenaC || (stairs ? {x:stairs.x+.5, y:stairs.y+.5} : null);
    if(tgt){
      const wx = tgt.x-player.x, wy = tgt.y-player.y;
      const a = Math.atan2((wx+wy)*TH/2, (wx-wy)*TW/2);
      const rr = 26;
      const axx = sx+Math.cos(a)*rr, ayy = sy-10+Math.sin(a)*rr*.6;
      cx.fillStyle = 'rgba(244,196,48,.9)';
      cx.beginPath();
      cx.moveTo(axx+Math.cos(a)*5, ayy+Math.sin(a)*5);
      cx.lineTo(axx+Math.cos(a+2.5)*4, ayy+Math.sin(a+2.5)*4);
      cx.lineTo(axx+Math.cos(a-2.5)*4, ayy+Math.sin(a-2.5)*4);
      cx.closePath(); cx.fill();
    }
  }
}

function drawEnemy(e, sx, sy){
  drawShadow(sx, sy, e.kind==='boss'?16:(e.kind==='guardian'?11:7));
  const bob = e.kind==='wisp' ? Math.sin(time*6+e.bob)*3 : 0;
  const img = enemyImg(e);
  if(e.flash>0) cx.globalAlpha = .5;
  cx.drawImage(img, sx-img.width, sy-img.height*2-2+bob, img.width*2, img.height*2);
  cx.globalAlpha = 1;
  if(e.kind!=='boss' && e.kind!=='guardian' && e.hp<e.maxhp){
    cx.fillStyle='#1a1520'; cx.fillRect(sx-7, sy-img.height*2-7, 14, 2);
    cx.fillStyle='#7ec850'; cx.fillRect(sx-7, sy-img.height*2-7, 14*e.hp/e.maxhp, 2);
  }
}

function drawPickup(p, sx, sy){
  const bob = Math.sin(time*4+sx)*1.5;
  drawShadow(sx, sy, 5);
  let img = COIN;
  if(p.kind==='ale') img = TANKARD;
  else if(p.kind==='book') img = BOOK;
  else if(p.kind==='relic') img = p.relic.img;
  else if(p.kind==='armor') img = ARMOR[p.idx].img;
  cx.drawImage(img, sx-img.width, sy-img.height*2-4+bob, img.width*2, img.height*2);
  if(p.kind==='relic'||p.kind==='armor'){
    // sparkle
    if((time*6|0)%3===0){ cx.fillStyle='#fff'; cx.fillRect(sx+5, sy-img.height*2-6+bob, 1, 1); }
  }
}

const darkCv = document.createElement('canvas');
darkCv.width = VW; darkCv.height = VH;
const dg = darkCv.getContext('2d');
function drawDarkness(T){
  const lr = pLight() * TW/2;
  const px = CXO, py = CYO;
  dg.clearRect(0,0,VW,VH);
  dg.globalCompositeOperation = 'source-over';
  dg.fillStyle = `rgba(${T.dark},.94)`;
  dg.fillRect(0,0,VW,VH);
  dg.globalCompositeOperation = 'destination-out';
  const rings = [[1.15,.149],[.95,.3125],[.75,.5455],[.55,1]];
  for(const [rf, cut] of rings){
    dg.fillStyle = `rgba(0,0,0,${cut})`;
    dg.beginPath();
    dg.ellipse(px, py, lr*rf, lr*rf*.55, 0, 0, Math.PI*2);
    dg.fill();
  }
  cx.drawImage(darkCv, 0, 0);
  if((time*8|0)%7===0){
    cx.fillStyle='rgba(255,200,120,.02)';
    cx.fillRect(0,0,VW,VH);
  }
}

// ---------- HUD ----------
function text(t, x, y, col, size, align){
  cx.font = `${size||8}px monospace`;
  cx.textAlign = align||'left';
  cx.textBaseline = 'top';
  cx.fillStyle = '#000';
  cx.fillText(t, x+1, y+1);
  cx.fillStyle = col||'#e8e0c8';
  cx.fillText(t, x, y);
}

function drawHUD(){
  const k = player.king;
  text(k.name.toUpperCase(), 6, 5, '#f4c430', 8);
  // HP tankards
  const tanks = Math.ceil(player.maxhp/2);
  for(let i=0;i<tanks;i++){
    const full = player.hp >= (i+1)*2, half = player.hp === i*2+1;
    const x = 6+i*10, y = 16;
    cx.fillStyle = full ? '#8a5a2b' : (half?'#6a4520':'#2a2430');
    cx.fillRect(x, y+2, 7, 7);
    cx.fillStyle = full ? '#f5f0dc' : (half?'#b8b09a':'#3a3440');
    cx.fillRect(x, y, 7, 3);
    cx.fillStyle = full||half ? '#a8713a' : '#332d3a';
    cx.fillRect(x+7, y+3, 2, 4);
  }
  // drunk stacks
  for(let i=0;i<player.drunk;i++){
    cx.fillStyle='#e05a4e'; cx.fillRect(6+i*6, 26, 4, 4);
  }
  // counters
  cx.drawImage(COIN, 6, 34);
  text('x'+player.gold, 14, 33, '#f4c430');
  cx.drawImage(BOOK, 40, 34);
  text(`${booksGot}/${booksTotal}`, 50, 33, '#caa96e');
  cx.drawImage(TANKARD, 82, 32);
  text(`${aleGot}/${aleTotal}`, 92, 33, '#c8b890');
  text('KILLS '+player.kills, 124, 33, '#9a8fa8');
  // relic + armor icons
  let rx = 6;
  for(const id in player.relics){ const r=player.relics[id]; cx.drawImage(r.img, rx, 46); rx += 11; }
  for(let i=0;i<4;i++){ if(player.armor[i]){ cx.drawImage(ARMOR[i].img, rx, 46); rx += 10; } }
  if(player.blickyAmmo>0) text('AMMO '+player.blickyAmmo, 6, 58, '#b8b8c0');
  // timer
  text(fmtMs(runMs), VW-6, 5, '#e8e0c8', 9, 'right');
  text(playerName, VW-6, 16, '#7a7088', 8, 'right');

  if(bannerT>0 && state==='play'){
    cx.globalAlpha = Math.min(1, bannerT);
    text(banner, VW/2, 72, '#e8e0c8', 9, 'center');
    cx.globalAlpha = 1;
  }
  // boss / guardian bar
  const big = (bossRef && bossRef.hp>0 && bossRef.aggroed) ? bossRef
            : (guardianRef && guardianRef.hp>0 && guardianRef.aggroed) ? guardianRef : null;
  if(big && state==='play'){
    const w = 200, x = VW/2-w/2, y = VH-22;
    const col = big.kind==='boss' ? '#9fff5a' : '#7affff';
    text(big.name, VW/2, y-11, col, 8, 'center');
    cx.fillStyle='#1a1520'; cx.fillRect(x-1, y-1, w+2, 8);
    cx.fillStyle='#2a3a44'; cx.fillRect(x, y, w, 6);
    cx.fillStyle=col; cx.fillRect(x, y, w*Math.max(0,big.hp)/big.maxhp, 6);
  } else if(state==='play' && !IS_TOUCH){
    text('WASD move · SPACE attack · K blicky · M mute', VW/2, VH-12, '#5c5568', 8, 'center');
  }
}

function drawTouchUI(){
  if(!IS_TOUCH || state!=='play') return;
  // joystick
  if(touch.joyId!==null && touch.joyBase){
    cx.strokeStyle='rgba(232,224,200,.35)'; cx.lineWidth=1;
    cx.beginPath(); cx.arc(touch.joyBase.x, touch.joyBase.y, 22, 0, Math.PI*2); cx.stroke();
    cx.fillStyle='rgba(232,224,200,.45)';
    cx.beginPath(); cx.arc(touch.joyBase.x+touch.joyVec.x*18, touch.joyBase.y+touch.joyVec.y*18, 8, 0, Math.PI*2); cx.fill();
  }
  // attack button
  cx.strokeStyle='rgba(244,196,48,.55)'; cx.lineWidth=2;
  cx.beginPath(); cx.arc(BTN_ATK.x, BTN_ATK.y, BTN_ATK.r, 0, Math.PI*2); cx.stroke();
  text('ATK', BTN_ATK.x, BTN_ATK.y-4, 'rgba(244,196,48,.8)', 8, 'center');
  if(player.blickyAmmo>0){
    cx.strokeStyle='rgba(184,184,192,.55)';
    cx.beginPath(); cx.arc(BTN_GUN.x, BTN_GUN.y, BTN_GUN.r, 0, Math.PI*2); cx.stroke();
    text('GUN', BTN_GUN.x, BTN_GUN.y-4, 'rgba(184,184,192,.8)', 8, 'center');
  }
}

function wrapText(s, maxw, size){
  cx.font = `${size}px monospace`;
  const words = s.split(' '); const lines=[]; let cur='';
  for(const w of words){
    const t = cur ? cur+' '+w : w;
    if(cx.measureText(t).width > maxw){ if(cur) lines.push(cur); cur = w; }
    else cur = t;
  }
  if(cur) lines.push(cur);
  return lines;
}

function drawLore(){
  cx.fillStyle='rgba(4,3,7,.75)'; cx.fillRect(0,0,VW,VH);
  const w=340, x=VW/2-w/2; let y=80;
  cx.fillStyle='#181322'; cx.fillRect(x-8,y-12,w+16,140);
  cx.strokeStyle='#caa96e'; cx.lineWidth=1; cx.strokeRect(x-8.5,y-12.5,w+17,141);
  cx.drawImage(BOOK, VW/2-4, y-6);
  y+=8;
  text(loreBox.t, VW/2, y, '#f4c430', 9, 'center'); y+=16;
  for(const line of wrapText(loreBox.b, w-10, 8)){ text(line, VW/2, y, '#d8d0c0', 8, 'center'); y+=11; }
  text(IS_TOUCH?'[ TAP ]':'[ SPACE ]', VW/2, y+8, '#5c5568', 8, 'center');
}

function drawDying(){
  cx.fillStyle=`rgba(10,20,8,${Math.min(.5,dyingT*.35)})`; cx.fillRect(0,0,VW,VH);
}

function drawDead(){
  cx.fillStyle=`rgba(14,8,6,${Math.min(.88,deadT+.4)})`; cx.fillRect(0,0,VW,VH);
  if(deadT>.3){
    text('YOUR SOUL IS LEFT', VW/2, 96, '#7ec850', 14, 'center');
    text('TO ROT WITH HIM', VW/2, 114, '#7ec850', 14, 'center');
    text('The soulless cannot die. But they are not alive.', VW/2, 138, '#b8a8a0', 8, 'center');
    text(`${player.king.name} — ${player.kills} slain · ${player.gold} gold · depth ${floorNo+1} · ${fmtMs(runMs)}`, VW/2, 154, '#9a8fa8', 8, 'center');
  }
  if(deadT>1) text(IS_TOUCH?'[ TAP ] return to the Gilded Tankard':'[ SPACE ] return to the Gilded Tankard', VW/2, 180, '#5c5568', 8, 'center');
}

function drawWin(){
  cx.fillStyle=`rgba(8,6,14,${Math.min(.9,winT*.6)})`; cx.fillRect(0,0,VW,VH);
  if(winT>.6){
    text('THE VEILRUNNER IS SLAIN', VW/2, 30, '#f4c430', 14, 'center');
    text(`${playerName} did it! You vanquished the Rotted Soul.`, VW/2, 54, '#9fff5a', 9, 'center');
    text("Now go to Sackbeard's Tavern and tell", VW/2, 70, '#e8e0c8', 9, 'center');
    text(`${shotKing.toUpperCase()} they need to take a shot.`, VW/2, 84, '#f4c430', 9, 'center');
    text(`${fmtMs(finalMs)}${lbImproved?'  ★ NEW BEST!':''} · ${player.kills} slain · ${player.gold} gold · ${player.books} tomes`, VW/2, 104, '#9a8fa8', 8, 'center');
    // leaderboard
    text('— HALL OF THE LIQUOR KINGS —', VW/2, 124, '#caa96e', 9, 'center');
    const top = lbTop(8);
    let y = 140;
    for(let i=0;i<top.length;i++){
      const [nm,ms] = top[i];
      const me = nm===playerName;
      text(`${i+1}. ${nm}`, VW/2-90, y, me?'#f4c430':'#c8c0b0', 8, 'left');
      text(fmtMs(ms), VW/2+90, y, me?'#f4c430':'#c8c0b0', 8, 'right');
      y += 11;
    }
    if(winT>1.4) text(IS_TOUCH?'[ TAP ] drink to it':'[ SPACE ] drink to it', VW/2, y+10, '#5c5568', 8, 'center');
  }
}

// ---------- title ----------
function drawTitle(){
  cx.fillStyle = '#0a0810'; cx.fillRect(0,0,VW,VH);
  for(let i=0;i<40;i++){
    const x=(i*137)%VW, y=(i*211)%VH;
    cx.fillStyle = 'rgba(90,74,120,.08)';
    cx.fillRect(x, y, 2, 2);
  }
  text('THE PINTLAND ISLES', VW/2, 18, '#9a8fa8', 10, 'center');
  text('THE ROTTED SOUL’S LABYRINTH', VW/2, 32, '#f4c430', 16, 'center');
  text('beneath the Hoegaarden Library', VW/2, 54, '#7a7088', 8, 'center');

  if(titlePhase==='name'){
    text('Sealed for millennia below the catacombs of Lagendale, the Rotten King stirs.', VW/2, 76, '#c8c0b0', 8, 'center');
    text('The Guardian’s spell is unraveling. Someone has to go down there.', VW/2, 88, '#c8c0b0', 8, 'center');
    text('WHO DESCENDS?', VW/2, 116, '#f4c430', 10, 'center');
    // name box
    const w=140, x=VW/2-w/2, y=132;
    cx.fillStyle='#181322'; cx.fillRect(x,y,w,16);
    cx.strokeStyle='#caa96e'; cx.strokeRect(x-.5,y-.5,w+1,17);
    const cur = (time*2|0)%2===0 ? '_' : ' ';
    text(playerName + cur, VW/2, y+4, '#e8e0c8', 9, 'center');
    text(IS_TOUCH ? (playerName.trim().length>=2 ? 'press ENTER / done to continue' : 'TAP THE BOX to type your name')
                  : (playerName.trim().length>=2 ? '[ ENTER ] continue' : 'type your name (2-12 letters)'),
      VW/2, 156, '#5c5568', 8, 'center');
    // leaderboard preview
    const top = lbTop(8);
    if(top.length){
      text('— HALL OF THE LIQUOR KINGS —', VW/2, 182, '#caa96e', 9, 'center');
      let y2 = 198;
      for(let i=0;i<top.length;i++){
        const [nm,ms]=top[i];
        text(`${i+1}. ${nm}`, VW/2-80, y2, '#c8c0b0', 8, 'left');
        text(fmtMs(ms), VW/2+80, y2, '#c8c0b0', 8, 'right');
        y2 += 11;
      }
    }
    return;
  }

  // king select phase
  text(`descending: ${playerName}`, VW/2, 74, '#7a7088', 8, 'center');
  const x0 = VW/2 - KING_SPACING*2.5;
  for(let i=0;i<6;i++){
    const k = KINGS[i], x = x0+i*KING_SPACING, y = KING_Y;
    if(i===kingSel){
      cx.fillStyle='#241d33'; cx.fillRect(x-22, y-14, 44, 44);
      cx.strokeStyle='#f4c430'; cx.strokeRect(x-22.5, y-14.5, 45, 45);
      const t=Math.sin(time*6)*2;
      text('▼', x, y-26+t, '#f4c430', 8, 'center');
    }
    cx.drawImage(k.img, x-k.img.width, y, k.img.width*2, k.img.height*2);
  }
  const k = KINGS[kingSel];
  text(k.name.toUpperCase(), VW/2, 204, '#f4c430', 10, 'center');
  text(k.tag, VW/2, 218, '#9a8fa8', 8, 'center');
  text(k.perk, VW/2, 230, '#c8c0b0', 8, 'center');
  const spdW = k.spd>4.8?'fast':k.spd<4?'slow':'avg';
  text(`HP ${k.hp}   DMG ${k.dmg}   SPD ${spdW}   SWING ${k.cd<.3?'quick':k.cd>.5?'heavy':'avg'}   SIGHT ${k.light>6?'far':'avg'}`, VW/2, 244, '#7ec850', 8, 'center');
  text(IS_TOUCH ? 'tap a king · tap here to DESCEND' : '◀ ▶ choose your Liquor King · ENTER descend', VW/2, 266, '#f4c430', 9, 'center');
  if(!IS_TOUCH) text('WASD/arrows move · SPACE attack · K blicky · M mute', VW/2, 282, '#413b4d', 8, 'center');
}

// ---------- main loop ----------
let last = performance.now();
function loop(now){
  const dt = Math.min(.05, (now-last)/1000);
  last = now;
  if(innerWidth!==fitW || innerHeight!==fitH) fit();
  if(state==='dying'){ dyingT += dt; if(dyingT>1.6){ state='dead'; deadT=0; } }
  if(state==='dead') deadT += dt;
  if(state==='win') winT += dt;
  update(dt);
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
showNameInput(); // game opens on the name screen

// debug hook
window.__game = {
  get state(){return state;}, set state(s){state=s;},
  get titlePhase(){return titlePhase;}, set titlePhase(p){titlePhase=p;},
  get playerName(){return playerName;}, set playerName(n){playerName=n;},
  confirmName, startGame, genFloor, nextFloor, hurtPlayer, applyPickup,
  player, KINGS, LORE, RELICS, ARMOR,
  get entities(){return entities;}, get pickups(){return pickups;},
  get floorNo(){return floorNo;}, get bossRef(){return bossRef;}, get guardianRef(){return guardianRef;},
  get stairsSealed(){return stairsSealed;}, get stairs(){return stairs;}, get arenaC(){return arenaC;},
  get runMs(){return runMs;}, set runMs(v){runMs=v;},
  get shotKing(){return shotKing;},
  get aleGot(){return aleGot;}, get booksGot(){return booksGot;},
  set loreBox(l){loreBox=l;},
  set kingSel(i){kingSel=i;},
  lbLoad, lbTop
};
</script>
